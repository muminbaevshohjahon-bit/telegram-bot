<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chellenj Tracker</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
        padding: 15px;
    }

    h2 {
        text-align: center;
    }

    .card {
        background: #1e293b;
        padding: 15px;
        margin: 10px 0;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        cursor: pointer;
        transition: 0.2s;
    }

    .card:hover {
        background: #334155;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        margin-top: 15px;
    }

    .day {
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        background: #1e293b;
        cursor: pointer;
    }

    .done {
        background: #22c55e;
    }

    .active {
        border: 2px solid yellow;
    }

    button {
        margin-top: 15px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: white;
        font-size: 16px;
    }
</style>
</head>

<body>

<h2>🔥 Chellenjlar</h2>

<div id="main"></div>

<div id="calendar" style="display:none;">
    <h3 id="title"></h3>
    <div class="grid" id="grid"></div>
    <button onclick="back()">⬅️ Orqaga</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const tasks = [
    "Tongda telefonsiz detox 1 soat 📱 ",
    "Shakarsiz hayot🧘",
    "Kitob mutolasi 15 daqiqa 📕",
    "Gazsiz ichimliklar 🍵",
    "23:00 gacha uyqu 🌙",
    "2 daqiqa sukunat 🧘",
    "DEEP WORK 🧘",
    "Kuniga 5000 so'm sarmoya 💸 "
];

let userDay = parseInt(localStorage.getItem("day")) || 1;

function renderMain(){
    const main = document.getElementById("main");
    main.innerHTML = "";

    tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<span>${task}</span><span>➡️</span>`;
        div.onclick = () => openCalendar(task);
        main.appendChild(div);
    });
}

function openCalendar(task){
    document.getElementById("main").style.display = "none";
    document.getElementById("calendar").style.display = "block";
    document.getElementById("title").innerText = task;

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    for(let i=1;i<=30;i++){
        const day = document.createElement("div");
        day.className = "day";
        day.innerText = i;

        let key = `${task}_${i}`;

        if(localStorage.getItem(key) === "done"){
            day.classList.add("done");
        }

        if(i === userDay){
            day.classList.add("active");
        }

        day.onclick = () => {
            if(i === userDay){
                const isDone = day.classList.toggle("done");
                localStorage.setItem(key, isDone ? "done" : "no");

                if(isDone){
                    tg.HapticFeedback.notificationOccurred("success");

                    tg.sendData(JSON.stringify({
                        action: "done",
                        task: task
                    }));
                }
            } else {
                tg.showAlert("Faqat bugungi kunni belgilash mumkin!");
            }
        };

        grid.appendChild(day);
    }
}

function back(){
    document.getElementById("main").style.display = "block";
    document.getElementById("calendar").style.display = "none";
}

renderMain();
</script>

</body>
</html>
