<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { color: var(--tg-theme-text-color); background: var(--tg-theme-bg-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--tg-theme-secondary-bg-color); border-radius: 12px; padding: 15px; width: 90%; margin: 10px 0; text-align: center; }
        .score { font-size: 32px; font-weight: bold; color: #0088cc; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Salom, <span id="username">Do'stim</span>!</h3>
        <p>Sizning ID: <b id="user-id">---</b></p>
    </div>
    <div class="card">
        <p>Muvaffaqiyat ko'rsatkichi</p>
        <div class="score">75%</div>
    </div>
    <button onclick="Telegram.WebApp.close()">Botga qaytish</button>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('user-id').innerText = tg.initDataUnsafe.user.id;
    </script>
</body>
</html>
