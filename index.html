<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>MBE Challenge Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --blue: #3b82f6; --text: #ffffff; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); }
        .container { padding: 16px; }
        .challenge-card { display: flex; justify-content: space-between; padding: 16px; margin: 10px 0; border-radius: 12px; background: var(--card); cursor: pointer; border: 1px solid #334155; transition: 0.2s; }
        .challenge-card:active { transform: scale(0.98); background: #334155; }
        .calendar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .day-box { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #e2e8f0; color: black; font-weight: bold; cursor: pointer; opacity: 0.5; }
        .day-box.active { border: 2px solid var(--accent); opacity: 1; transform: scale(1.05); }
        .day-box.done { background: var(--accent); color: white; opacity: 1; border: none; }
        .back-btn { display: inline-block; padding: 8px 16px; background: var(--card); border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        .progress { margin: 15px 0; height: 10px; background: #1e293b; border-radius: 6px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }
        #calendarView { display: none; }
        h2 { color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="userName">Salom!</h2>

    <div id="mainView">
        <div id="challengeList"></div>
    </div>

    <div id="calendarView">
        <div class="back-btn" onclick="showMain()">⬅ Orqaga</div>
        <h2 id="calTitle"></h2>
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        <p style="font-size: 12px; opacity: 0.7;">Faqat bugungi (atrofi yashil) kunni belgilash mumkin.</p>
        <div class="calendar" id="calendarGrid"></div>
    </div>
</div>

        document.getElementById('mainView').style.display = 'block';
        document.getElementById('calendarView').style.display = 'none';
    }

    function init() {
        const list = document.getElementById('challengeList');
        list.innerHTML = '';
        tasks.forEach(task => {
            const card = document.createElement('div');

            card.innerHTML = `<span>${task.name}</span><span>➡️</span>`;

            list.appendChild(card);
        });

            document.getElementById('userName').innerText = "Salom, " + tg.initDataUnsafe.user.first_name + "!";
        }
    }
