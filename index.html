<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBE Useful</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #1c1c1e; --card: #2c2c2e; --accent: #34c759; --text: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; -webkit-tap-highlight-color: transparent; }
        .header { text-align: center; margin-bottom: 25px; }
        .challenge-list { display: grid; gap: 12px; }
        .challenge-card { background: var(--card); padding: 18px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3a3a3c; cursor: pointer; transition: 0.2s; }
        .challenge-card:active { background: #3a3a3c; transform: scale(0.97); }

        #calendarView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 100; }
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .day-box { aspect-ratio: 1; background: var(--card); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 600; border: 1px solid #3a3a3c; transition: 0.2s; }
        .day-box.done { background: var(--accent); color: black; border: none; }
        
        .back-btn { background: #3a3a3c; color: white; border: none; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; width: 100%; font-weight: bold; }
        h2 { margin: 0; color: var(--accent); font-size: 24px; }
    </style>
</head>
<body>

    <div id="mainView">
        <div class="header">
            <h2 id="userHello">Salom!</h2>
            <p style="opacity: 0.7;">Vazifani tanlang:</p>
        </div>
        <div class="challenge-list" id="challengeList">
            </div>
    </div>

    <div id="calendarView">
        <button class="back-btn" onclick="closeCalendar()">⬅️ Orqaga qaytish</button>
        <h2 id="calTitle">Vazifa</h2>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const challenges = ["Kitob mutolasi 📚", "Jismoniy mashq 💪", "Sugar detox 🍬", "Gazsiz ichimliklar 🥤"];
        const challengeList = document.getElementById('challengeList');

        // Bosh sahifadagi tugmalarni yaratish
        challenges.forEach(name => {
            const card = document.createElement('div');
            card.className = 'challenge-card';
            card.innerHTML = `<span>${name}</span><span>➡️</span>`;
            card.onclick = () => openCalendar(name);
            challengeList.appendChild(card);
        });

        function openCalendar(name) {
            document.getElementById('mainView').style.display = 'none';
            const view = document.getElementById('calendarView');
            view.style.display = 'block';
            document.getElementById('calTitle').innerText = name;
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= 30; i++) {
                const day = document.createElement('div');
                day.className = 'day-box';
                day.innerText = i;
                
                // Saqlangan holatni tekshirish
                const key = `${name}-day-${i}`;
                if (localStorage.getItem(key) === 'done') day.classList.add('done');

                day.onclick = function() {
                    this.classList.toggle('done');
                    const isDone = this.classList.contains('done');
                    localStorage.setItem(key, isDone ? 'done' : '');
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                };
                grid.appendChild(day);
            }
        }

        function closeCalendar() {
            document.getElementById('calendarView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
        }

        if (tg.initDataUnsafe.user) {
            document.getElementById('userHello').innerText = "Salom, " + tg.initDataUnsafe.user.first_name + "!";
        }
    </script>
</body>
</html>
