<script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tasks = ["Tongda telefonsiz detox 📵", "Kitob mutolasi 📚", "Sugar detox 🍬", "Gazsiz ichimliklar 🥤", "5000 so'm sarmoya 💰", "Jismoniy mashq 💪", "Soat 23:00 gacha uxlash 🌛", "1 daqiqa sukunat 🧘‍♂️"];
        
        const urlParams = new URLSearchParams(window.location.search);
        const dayFromUrl = parseInt(urlParams.get('day'));
        let userDay = dayFromUrl || parseInt(localStorage.getItem('current_discipline_day')) || 1;
        localStorage.setItem('current_discipline_day', userDay);

        function showMain() {
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('calendarView').style.display = 'none';
        }

        function init() {
            const list = document.getElementById('challengeList');
            list.innerHTML = ''; 
            tasks.forEach(t => {
                const card = document.createElement('div');
                card.className = 'challenge-card';
                card.innerHTML = `<span>${t}</span><span>➡️</span>`;
                card.onclick = () => openCalendar(t);
                list.appendChild(card);
            });
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                document.getElementById('userName').innerText = "Salom, " + tg.initDataUnsafe.user.first_name + "!";
            }
        }

        function openCalendar(name) {
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('calendarView').style.display = 'block';
            document.getElementById('calTitle').innerText = name;
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= 30; i++) {
                const day = document.createElement('div');
                day.className = 'day-box';
                day.innerText = i;
                
                const key = `t_${name.replace(/\s/g, '')}_d_${i}`;
                
                if (localStorage.getItem(key) === 'done') {
                    day.classList.add('done');
                }
                
                if (i === userDay) {
                    day.classList.add('active');
                }

                grid.appendChild(day);

                day.onclick = () => {
                    if (i === userDay) {
                        const isDone = day.classList.toggle('done');
                        localStorage.setItem(key, isDone ? 'done' : 'not_done');
                        
                        if (isDone) {
                            tg.HapticFeedback.notificationOccurred('success');
                            // Botga ma'lumot yuborish (Finish foizi uchun)
                            tg.sendData(name); 
                        }
                    } else {
                        tg.showAlert("Faqat bugungi kunni belgilash mumkin!");
                    }
                };
            }
        }

        // --- ENGI MUHIM QISMI: Sahifa yuklanganda funksiyani ishga tushirish ---
        window.onload = init;
    </script>
